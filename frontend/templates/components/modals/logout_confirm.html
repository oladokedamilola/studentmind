<!-- Logout Confirmation Modal -->
<div class="modal-overlay" id="logoutConfirmModal" style="display: none;">
    <div class="modal-content">
        <div class="modal-icon">👋</div>
        <h3>Leaving So Soon?</h3>
        <p>Are you sure you want to logout?</p>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="hideLogoutModal()">Cancel</button>
            <button class="btn btn-primary" onclick="performLogout()">Logout</button>
        </div>
    </div>
</div>

<script>
function showLogoutModal() {
    document.getElementById('logoutConfirmModal').style.display = 'flex';
}

function hideLogoutModal() {
    document.getElementById('logoutConfirmModal').style.display = 'none';
}

async function performLogout() {
    hideLogoutModal();
    flashMessages.success('Logging out...');
    
    const result = await logout();
    if (result.success) {
        setTimeout(() => {
            window.location.href = '/';
        }, 2000);
    } else {
        flashMessages.error('Logout failed. Please try again.');
    }
}
</script>
