{% extends "base/public_base.html" %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <!-- Back Link -->
    <a href="/verify-student" class="d-inline-flex align-items-center mt-4" style="color: #5D7A5C;">
        <i class="fas fa-arrow-left me-2"></i> Back to Verification
    </a>

    <!-- Progress -->
    <div class="progress-container">
        <div class="progress-steps">
            <span>Step 3 of 3</span>
            <span>100%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" style="width: 100%"></div>
        </div>
    </div>

    <!-- Main Card -->
    <div class="card">
        <h2 class="text-center mb-4">🔐 Create Your Password</h2>

        <form id="passwordForm">
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password" class="form-input" id="password" required>
                    <button type="button" class="position-absolute" style="right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none;" onclick="togglePassword('password')">
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="position-relative">
                    <input type="password" class="form-input" id="confirmPassword" required>
                    <button type="button" class="position-absolute" style="right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none;" onclick="togglePassword('confirmPassword')">
                        <i class="fas fa-eye" id="toggleConfirmPassword"></i>
                    </button>
                </div>
            </div>

            <!-- Password Strength -->
            <div id="strengthContainer" class="mb-3"></div>
            <div id="criteriaContainer" class="mb-3"></div>

            <!-- Requirements Info Card -->
            <div class="info-card">
                <span class="info-icon">👆</span>
                <div>
                    <strong>Your password must have:</strong>
                    <ul class="mt-2 mb-0">
                        <li>Minimum 8 characters</li>
                        <li>At least 1 number</li>
                        <li>1 uppercase letter</li>
                        <li>1 lowercase letter</li>
                    </ul>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4" id="createAccountBtn" disabled>
                Create Account
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const createBtn = document.getElementById('createAccountBtn');
    const form = document.getElementById('passwordForm');
    
    const strengthContainer = document.getElementById('strengthContainer');
    const criteriaContainer = document.getElementById('criteriaContainer');

    // Initialize password strength checker
    initPasswordStrengthMeter(passwordInput, strengthContainer, criteriaContainer);

    // Validation function
    function validateForm() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        
        const strengthResult = new PasswordStrength().check(password);
        const matchResult = validatePasswordMatch(password, confirm);
        
        return strengthResult.isValid && matchResult.valid;
    }

    // Real-time validation
    passwordInput.addEventListener('input', function() {
        createBtn.disabled = !validateForm();
    });

    confirmInput.addEventListener('input', function() {
        createBtn.disabled = !validateForm();
        
        // Show match error
        if (confirmInput.value) {
            const matchResult = validatePasswordMatch(passwordInput.value, confirmInput.value);
            if (!matchResult.valid) {
                confirmInput.classList.add('error');
                showError(confirmInput, matchResult.message);
            } else {
                confirmInput.classList.remove('error');
                removeError(confirmInput);
            }
        }
    });

    // Form submission
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if (!validateForm()) {
            flashMessages.error('Please meet all password requirements');
            return;
        }

        const matricNumber = sessionStorage.getItem('matricNumber');
        if (!matricNumber) {
            flashMessages.error('Session expired. Please start over.');
            window.location.href = '/verify-matric';
            return;
        }

        // Show loading
        createBtn.disabled = true;
        createBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Account...';

        // Create account
        const result = await createPassword(matricNumber, passwordInput.value);
        
        if (result.success) {
            flashMessages.success('Account created successfully!');
            sessionStorage.removeItem('matricNumber');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 2000);
        } else {
            flashMessages.error(result.error || 'Account creation failed');
            createBtn.disabled = false;
            createBtn.innerHTML = 'Create Account';
        }
    });
});

function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const toggleBtn = field.nextElementSibling.querySelector('i');
    
    if (field.type === 'password') {
        field.type = 'text';
        toggleBtn.classList.remove('fa-eye');
        toggleBtn.classList.add('fa-eye-slash');
    } else {
        field.type = 'password';
        toggleBtn.classList.remove('fa-eye-slash');
        toggleBtn.classList.add('fa-eye');
    }
}

function showError(input, message) {
    removeError(input);
    const error = document.createElement('span');
    error.className = 'form-error';
    error.textContent = message;
    input.parentNode.appendChild(error);
}

function removeError(input) {
    const existingError = input.parentNode.querySelector('.form-error');
    if (existingError) existingError.remove();
}
</script>
{% endblock %}
