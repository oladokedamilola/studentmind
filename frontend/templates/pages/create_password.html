{% extends "base/public_base.html" %}

{% block content %}
<div class="container mb-5" style="max-width: 600px;">
    <!-- Back Link -->
    <a href="{% url 'pages:student_confirmation' %}" class="d-inline-flex align-items-center mt-4" style="color: #5D7A5C; text-decoration: none;">
        <i class="fas fa-arrow-left me-2"></i> Back to Verification
    </a>

    <!-- Progress -->
    <div class="progress-container">
        <div class="progress-steps">
            <span>Step 3 of 3</span>
            <span>100%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" style="width: 100%"></div>
        </div>
    </div>

    <!-- Main Card -->
    <div class="card">
        <h2 class="text-center mb-4">🔐 Create Your Password</h2>

        <form id="passwordForm">
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password" class="form-input" id="password" required autocomplete="new-password">
                    <button type="button" class="position-absolute" style="right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer;" onclick="togglePassword('password')">
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="position-relative">
                    <input type="password" class="form-input" id="confirmPassword" required autocomplete="new-password">
                    <button type="button" class="position-absolute" style="right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer;" onclick="togglePassword('confirmPassword')">
                        <i class="fas fa-eye" id="toggleConfirmPassword"></i>
                    </button>
                </div>
            </div>

            <!-- Password Strength Meter -->
            <div id="strengthContainer" class="mb-3" style="display: none;"></div>
            
            <!-- Slide-down Criteria Panel -->
            <div id="criteriaPanel" class="criteria-panel" style="display: none;">
                <div class="criteria-header">
                    <i class="fas fa-shield-alt me-2"></i>Password Requirements
                </div>
                <div class="criteria-list">
                    <div class="criteria-item" id="criteria-length">
                        <i class="fas fa-circle criteria-icon"></i>
                        <span>At least 8 characters</span>
                    </div>
                    <div class="criteria-item" id="criteria-uppercase">
                        <i class="fas fa-circle criteria-icon"></i>
                        <span>At least one uppercase letter (A-Z)</span>
                    </div>
                    <div class="criteria-item" id="criteria-lowercase">
                        <i class="fas fa-circle criteria-icon"></i>
                        <span>At least one lowercase letter (a-z)</span>
                    </div>
                    <div class="criteria-item" id="criteria-number">
                        <i class="fas fa-circle criteria-icon"></i>
                        <span>At least one number (0-9)</span>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4" id="createAccountBtn" disabled>
                Create Account
            </button>
        </form>
    </div>
</div>

<style>
/* Criteria Panel Styles */
.criteria-panel {
    background: #FDF6E9;
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
    border-left: 4px solid #9CAF88;
    animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.criteria-header {
    font-weight: 600;
    color: #2C3E2C;
    margin-bottom: 12px;
    font-size: 0.9rem;
}

.criteria-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.criteria-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    color: #5D7A5C;
    transition: all 0.2s ease;
}

.criteria-icon {
    font-size: 0.7rem;
    width: 16px;
    color: #B99B7C;
    transition: all 0.2s ease;
}

.criteria-item.valid .criteria-icon {
    color: #4A6B4A;
}

.criteria-item.valid .criteria-icon {
    content: "✓";
}

.criteria-item.invalid .criteria-icon {
    color: #C47E7E;
}

/* Strength Meter */
.strength-meter {
    height: 6px;
    background: #E6E6FA;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
}

.strength-meter-fill {
    height: 100%;
    width: 0%;
    transition: width 0.3s ease, background 0.3s ease;
    border-radius: 3px;
}

.strength-text {
    font-size: 0.75rem;
    margin-top: 6px;
    font-weight: 500;
}

.strength-weak { background: #C47E7E; }
.strength-medium { background: #E5B25D; }
.strength-strong { background: #4A6B4A; }

/* Form Input Styles */
.form-input.valid {
    border-color: #4A6B4A;
    background-color: rgba(74, 107, 74, 0.05);
}

.form-input.error {
    border-color: #C47E7E;
    background-color: rgba(196, 126, 126, 0.05);
}

.form-error {
    color: #C47E7E;
    font-size: 0.75rem;
    margin-top: 4px;
    display: block;
}
</style>

<script>
// Password Strength Checker Class
class PasswordStrengthChecker {
    constructor() {
        this.requirements = [
            { regex: /.{8,}/, message: 'At least 8 characters', id: 'criteria-length' },
            { regex: /[A-Z]/, message: 'Uppercase letter', id: 'criteria-uppercase' },
            { regex: /[a-z]/, message: 'Lowercase letter', id: 'criteria-lowercase' },
            { regex: /[0-9]/, message: 'Number', id: 'criteria-number' }
        ];
    }
    
    check(password) {
        const results = this.requirements.map(req => ({
            passed: req.regex.test(password),
            message: req.message,
            id: req.id
        }));
        
        const score = results.filter(r => r.passed).length;
        let strength = 'weak';
        let strengthText = 'Weak';
        
        if (score === 4) {
            strength = 'strong';
            strengthText = 'Strong';
        } else if (score >= 2) {
            strength = 'medium';
            strengthText = 'Medium';
        }
        
        return {
            isValid: score === 4,
            score: score,
            strength: strength,
            strengthText: strengthText,
            results: results
        };
    }
}

// API endpoint
const API_BASE_URL = '/api/accounts/api';

// Get CSRF token
function getCsrfToken() {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, 10) === 'csrftoken=') {
                cookieValue = decodeURIComponent(cookie.substring(10));
                break;
            }
        }
    }
    return cookieValue;
}

// Create password API call - Sends both password and confirm_password
async function createPassword(password, confirmPassword) {
    try {
        const response = await fetch(`${API_BASE_URL}/create-password/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCsrfToken()
            },
            body: JSON.stringify({ 
                password: password,
                confirm_password: confirmPassword
            }),
            credentials: 'same-origin'
        });

        const data = await response.json();
        
        if (!response.ok) {
            if (response.status === 400) {
                // Handle field-specific errors
                if (data.errors && data.errors.password) {
                    throw new Error(data.errors.password.join(', '));
                } else if (data.errors && data.errors.confirm_password) {
                    throw new Error(data.errors.confirm_password.join(', '));
                } else if (data.error) {
                    throw new Error(data.error);
                } else {
                    throw new Error('Invalid password. Please check requirements.');
                }
            }
            throw new Error(data.error || 'Failed to create account');
        }

        return { success: true, data: data };
    } catch (error) {
        console.error('Error creating password:', error);
        return { success: false, error: error.message };
    }
}

// Toggle password visibility
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const toggleBtn = field.nextElementSibling.querySelector('i');
    
    if (field.type === 'password') {
        field.type = 'text';
        toggleBtn.classList.remove('fa-eye');
        toggleBtn.classList.add('fa-eye-slash');
    } else {
        field.type = 'password';
        toggleBtn.classList.remove('fa-eye-slash');
        toggleBtn.classList.add('fa-eye');
    }
}

// Show error message
function showError(input, message) {
    removeError(input);
    const error = document.createElement('span');
    error.className = 'form-error';
    error.textContent = message;
    input.parentNode.appendChild(error);
}

// Remove error message
function removeError(input) {
    const existingError = input.parentNode.querySelector('.form-error');
    if (existingError) existingError.remove();
}

// Update strength meter
function updateStrengthMeter(password, strengthChecker) {
    const strengthContainer = document.getElementById('strengthContainer');
    const result = strengthChecker.check(password);
    
    if (password.length === 0) {
        strengthContainer.style.display = 'none';
        return;
    }
    
    strengthContainer.style.display = 'block';
    
    let strengthColor = '';
    let strengthText = '';
    
    switch(result.strength) {
        case 'weak':
            strengthColor = '#C47E7E';
            strengthText = 'Weak';
            break;
        case 'medium':
            strengthColor = '#E5B25D';
            strengthText = 'Medium';
            break;
        case 'strong':
            strengthColor = '#4A6B4A';
            strengthText = 'Strong';
            break;
    }
    
    strengthContainer.innerHTML = `
        <div class="strength-meter">
            <div class="strength-meter-fill" style="width: ${(result.score / 4) * 100}%; background: ${strengthColor};"></div>
        </div>
        <div class="strength-text" style="color: ${strengthColor};">${strengthText} Password</div>
    `;
}

// Update criteria items
function updateCriteria(password, strengthChecker) {
    const result = strengthChecker.check(password);
    
    result.results.forEach(criteria => {
        const element = document.getElementById(criteria.id);
        if (element) {
            if (criteria.passed) {
                element.classList.add('valid');
                element.classList.remove('invalid');
                element.querySelector('.criteria-icon').className = 'fas fa-check-circle criteria-icon';
            } else {
                element.classList.add('invalid');
                element.classList.remove('valid');
                element.querySelector('.criteria-icon').className = 'fas fa-circle criteria-icon';
            }
        }
    });
}

// Show/hide criteria panel based on focus
function setupCriteriaPanel() {
    const passwordInput = document.getElementById('password');
    const criteriaPanel = document.getElementById('criteriaPanel');
    
    passwordInput.addEventListener('focus', function() {
        if (this.value.length === 0) {
            criteriaPanel.style.display = 'block';
        }
    });
    
    passwordInput.addEventListener('blur', function() {
        criteriaPanel.style.display = 'none';
    });
    
    passwordInput.addEventListener('input', function() {
        if (this.value.length > 0 && criteriaPanel.style.display !== 'block') {
            criteriaPanel.style.display = 'block';
        } else if (this.value.length === 0 && document.activeElement !== this) {
            criteriaPanel.style.display = 'none';
        }
    });
}

document.addEventListener('DOMContentLoaded', function() {
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const createBtn = document.getElementById('createAccountBtn');
    const form = document.getElementById('passwordForm');
    
    const strengthChecker = new PasswordStrengthChecker();
    
    // Setup criteria panel (slides down on focus)
    setupCriteriaPanel();
    
    // Validate function
    function validateForm() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        
        const result = strengthChecker.check(password);
        const passwordsMatch = password === confirm;
        
        return result.isValid && passwordsMatch && password.length > 0;
    }
    
    // Update UI on password input
    passwordInput.addEventListener('input', function() {
        const password = this.value;
        
        // Update strength meter
        updateStrengthMeter(password, strengthChecker);
        
        // Update criteria
        updateCriteria(password, strengthChecker);
        
        // Update confirm password validation if it has content
        if (confirmInput.value) {
            if (password !== confirmInput.value) {
                confirmInput.classList.add('error');
                showError(confirmInput, 'Passwords do not match');
            } else {
                confirmInput.classList.remove('error');
                removeError(confirmInput);
            }
        }
        
        // Enable/disable button
        createBtn.disabled = !validateForm();
        
        // Add/remove valid class
        const result = strengthChecker.check(password);
        if (result.isValid) {
            passwordInput.classList.add('valid');
        } else {
            passwordInput.classList.remove('valid');
        }
    });
    
    // Confirm password validation
    confirmInput.addEventListener('input', function() {
        const password = passwordInput.value;
        const confirm = this.value;
        
        if (confirm) {
            if (password !== confirm) {
                this.classList.add('error');
                showError(this, 'Passwords do not match');
            } else {
                this.classList.remove('error');
                removeError(this);
                this.classList.add('valid');
            }
        } else {
            this.classList.remove('error', 'valid');
            removeError(this);
        }
        
        createBtn.disabled = !validateForm();
    });
    
    // Form submission - UPDATED with auto-login
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if (!validateForm()) {
            flashMessages.error('Please meet all password requirements');
            return;
        }
        
        const password = passwordInput.value;
        const confirmPassword = confirmInput.value;
        
        // Show loading
        createBtn.disabled = true;
        createBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Your Account...';
        
        // Send both password and confirm_password
        const result = await createPassword(password, confirmPassword);
        
        if (result.success) {
            // User is now logged in via session (handled by backend)
            flashMessages.success('Welcome to MindHaven! Redirecting to your dashboard...');
            
            // Clear registration data from session storage
            sessionStorage.removeItem('matricNumber');
            sessionStorage.removeItem('verified_student');
            sessionStorage.removeItem('registering_student_id');
            
            // Redirect to dashboard (user is already logged in)
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        } else {
            flashMessages.error(result.error || 'Account creation failed');
            createBtn.disabled = false;
            createBtn.innerHTML = 'Create Account';
        }
    });
    
    // Initial button state
    createBtn.disabled = true;
});

// Make togglePassword globally available
window.togglePassword = togglePassword;
</script>
{% endblock %}
