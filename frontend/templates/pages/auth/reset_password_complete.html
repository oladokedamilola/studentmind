{% extends "base/public_base.html" %}

{% block content %}
<div class="container" style="max-width: 500px;">
    <!-- Success Card -->
    <div class="card mt-5 text-center">
        <div class="card-body py-5">
            <div style="font-size: 5rem; margin-bottom: 1rem;">
                <i class="fas fa-check-circle" style="color: #51cf66;"></i>
            </div>
            
            <h3 class="mb-3">Password Reset Complete!</h3>
            
            <p class="mb-4" style="color: #5D7A5C;">
                Your password has been successfully reset.
                You can now log in with your new password.
            </p>
            
            <div class="info-card mb-4">
                <span class="info-icon">🔒</span>
                <span>For security, you've been logged out of all devices.</span>
            </div>
            
            <a href="/login" class="btn btn-primary">
                <i class="fas fa-sign-in-alt me-2"></i>Log In Now
            </a>
            
            <div class="mt-4">
                <a href="/" style="color: #B99B7C;">Return to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
