{% extends "base/public_base.html" %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="text-center py-5">
        <!-- Illustration -->
        <div style="font-size: 8rem; margin-bottom: 1rem;">
            <i class="fas fa-compass" style="color: #E6E6FA;"></i>
        </div>
        
        <h1 class="display-1 mb-3" style="color: #9CAF88;">404</h1>
        <h2 class="mb-4">Page Not Found</h2>
        
        <p class="lead mb-4" style="color: #5D7A5C;">
            Oops! It seems you've wandered off the path.<br>
            The page you're looking for doesn't exist.
        </p>

        <!-- Suggestions -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="mb-3">You might want to:</h5>
                <div class="d-flex flex-wrap gap-2 justify-content-center">
                    <a href="/" class="btn btn-primary">
                        <i class="fas fa-home me-2"></i>Go Home
                    </a>
                    <a href="/dashboard" class="btn btn-outline">
                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                    </a>
                    <a href="/resources" class="btn btn-outline">
                        <i class="fas fa-book-open me-2"></i>Resources
                    </a>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div class="info-card">
            <span class="info-icon">🔍</span>
            <span>Try searching for what you need</span>
        </div>
        
        <div class="mt-4">
            <a href="/contact" style="color: #B99B7C;">Contact Support</a>
        </div>
    </div>
</div>

<style>
.display-1 {
    font-size: 6rem;
    font-weight: 700;
    line-height: 1;
}
</style>
{% endblock %}
