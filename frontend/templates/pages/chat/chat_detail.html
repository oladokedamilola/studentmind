{% extends "base/authenticated_base.html" %}
{% load static %}

{% block title %}Chat - MindHaven{% endblock %}

{% block content %}
<div class="chat-container" style="height: calc(100vh - var(--header-height) - 20px); display: flex; flex-direction: column; overflow: hidden; width: 100%; max-width: 100%;">
    <!-- Chat Header - Responsive -->
    <div class="chat-header d-flex align-items-center justify-content-between pb-3 border-bottom" style="flex-shrink: 0;">
        <div class="d-flex align-items-center" style="min-width: 0; flex: 1;">
            <a href="{% url 'pages:chat_list' %}" class="btn btn-link p-0 me-2 me-sm-3" style="color: #5D7A5C; font-size: 1.2rem;">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div style="min-width: 0; flex: 1;">
                <h5 class="mb-0 text-truncate" id="chatTopic" style="font-size: clamp(1rem, 4vw, 1.25rem);">Loading...</h5>
                <small class="text-muted text-truncate d-block" id="chatTime" style="font-size: clamp(0.7rem, 3vw, 0.875rem);"></small>
            </div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="showChatOptions()" style="flex-shrink: 0;">
            <i class="fas fa-ellipsis-v"></i>
        </button>
    </div>

    <!-- Messages Container - Responsive -->
    <div class="messages-container flex-grow-1 overflow-auto mb-2 mb-sm-3" id="messagesContainer" style="overflow-y: auto; overflow-x: hidden; padding: 10px 8px;">
        <!-- Loading State -->
        <div id="messagesLoading" class="text-center py-5">
            <div class="spinner-border text-sage" role="status">
                <span class="visually-hidden">Loading messages...</span>
            </div>
        </div>
        
        <!-- Error State -->
        <div id="messagesError" class="text-center py-5" style="display: none;">
            <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
            <h5 class="h6">Failed to load messages</h5>
            <button class="btn btn-outline-danger btn-sm mt-2" onclick="loadMessages()">
                <i class="fas fa-sync-alt me-2"></i>Try Again
            </button>
        </div>
        
        <!-- Messages will be inserted here by JavaScript -->
        <div id="messagesList"></div>
    </div>

    <!-- Message Input - Responsive -->
    <div class="message-input-container p-2 p-sm-3" style="background: white; border-radius: 16px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); flex-shrink: 0;">
        <form id="messageForm" onsubmit="sendMessage(event)">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <input type="text" class="form-control" placeholder="Type your message..." id="messageInput" autocomplete="off" disabled style="font-size: clamp(0.875rem, 3vw, 1rem); padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 16px);">
                <button type="submit" class="btn btn-primary" id="sendButton" disabled style="padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 16px);">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Chat Options Modal -->
<div class="modal fade" id="chatOptionsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Chat Options</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <div class="list-group list-group-flush">
                    <button class="list-group-item list-group-item-action" onclick="saveConversation()">
                        <i class="fas fa-save me-2" style="color: #9CAF88;"></i>Save Conversation
                    </button>
                    <button class="list-group-item list-group-item-action" onclick="exportChat()">
                        <i class="fas fa-file-pdf me-2" style="color: #9CAF88;"></i>Export as PDF
                    </button>
                    <button class="list-group-item list-group-item-action text-danger" onclick="deleteConversation()">
                        <i class="fas fa-trash me-2"></i>Delete Conversation
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Responsive Chat Styles */
.chat-container {
    max-width: 100%;
    overflow-x: hidden;
}

.chat-header {
    flex-shrink: 0;
    background: white;
    margin: 0;
    padding: 0 0 12px 0;
}

.messages-container {
    scroll-behavior: smooth;
    background: transparent;
}

/* Message Bubbles - Responsive */
.message-row {
    margin-bottom: 1rem;
    clear: both;
}

.message-avatar {
    flex-shrink: 0;
}

.message-bubble {
    position: relative;
    word-wrap: break-word;
    word-break: break-word;
    max-width: min(85%, 450px);
}

.message-bubble p {
    margin: 0;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
}

/* User message */
.user-message .message-bubble {
    max-width: min(85%, 450px);
    margin-left: auto;
}

/* AI message */
.ai-message .message-bubble {
    max-width: min(85%, 450px);
    margin-right: auto;
}

/* Typing indicator */
.typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    justify-content: center;
    min-width: 40px;
}

.typing-dots span {
    animation: blink 1.4s infinite;
    animation-fill-mode: both;
    font-size: 24px;
    line-height: 1;
    margin: 0;
}

.typing-dots span:nth-child(2) {
    animation-delay: 0.2s;
}

.typing-dots span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes blink {
    0% { opacity: 0.2; transform: translateY(0); }
    20% { opacity: 1; transform: translateY(-3px); }
    100% { opacity: 0.2; transform: translateY(0); }
}

/* Breathing exercise button */
.breathing-exercise-btn {
    background: #9CAF88;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    margin-top: 10px;
    transition: all 0.2s ease;
}

.breathing-exercise-btn:hover {
    background: #5D7A5C;
    transform: translateY(-1px);
}

/* Mobile specific adjustments */
@media (max-width: 768px) {
    .message-bubble {
        max-width: min(90%, 350px) !important;
    }
    
    .message-bubble p {
        font-size: 0.9rem;
    }
    
    .message-avatar {
        width: 28px !important;
        height: 28px !important;
    }
    
    .message-avatar i {
        font-size: 14px !important;
    }
    
    .typing-dots span {
        font-size: 18px;
    }
    
    .chat-header {
        padding: 0 0 10px 0;
    }
    
    .btn-outline.btn-sm {
        padding: 4px 8px;
        font-size: 0.8rem;
    }
}

/* Small phone adjustments */
@media (max-width: 480px) {
    .message-bubble {
        max-width: min(95%, 280px) !important;
        padding: 10px 12px !important;
    }
    
    .message-bubble p {
        font-size: 0.85rem;
    }
    
    .message-avatar {
        width: 24px !important;
        height: 24px !important;
    }
    
    .message-avatar i {
        font-size: 12px !important;
    }
    
    .breathing-exercise-btn {
        padding: 4px 12px;
        font-size: 0.75rem;
    }
}

/* Landscape mode on phones */
@media (max-width: 768px) and (orientation: landscape) {
    .chat-container {
        height: calc(100vh - var(--header-height) - 10px) !important;
    }
    
    .message-bubble {
        max-width: min(85%, 400px) !important;
    }
}
</style>

<script src="{% static 'js/chat-service.js' %}"></script>
<script>
const conversationId = {{ conversation_id }};
let currentConversation = null;
let isWaitingForResponse = false;
let currentTypingMessage = null;

// Helper function to escape HTML
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Typing effect function - reveals text character by character
function typeMessage(element, fullText, speed = 15) {
    return new Promise((resolve) => {
        let index = 0;
        element.textContent = '';
        
        function type() {
            if (index < fullText.length) {
                element.textContent += fullText.charAt(index);
                index++;
                scrollToBottom();
                setTimeout(type, speed);
            } else {
                resolve();
            }
        }
        
        type();
    });
}

function scrollToBottom() {
    const container = document.getElementById('messagesContainer');
    if (container) {
        container.scrollTop = container.scrollHeight;
    }
}

function updateInputState() {
    const inputEl = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendButton');
    if (inputEl) inputEl.disabled = isWaitingForResponse;
    if (sendBtn) sendBtn.disabled = isWaitingForResponse;
}

// Show typing indicator
function showTypingIndicator() {
    const container = document.getElementById('messagesList');
    if (!container) return;
    
    hideTypingIndicator();
    
    const indicator = document.createElement('div');
    indicator.id = 'typingIndicator';
    indicator.className = 'message-row ai-message mb-3';
    indicator.innerHTML = `
        <div class="d-flex align-items-start">
            <div class="message-avatar me-2" style="width: 36px; height: 36px; background: #9CAF88; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-robot" style="color: white; font-size: 18px;"></i>
            </div>
            <div class="message-bubble" style="background: #FDF6E9; border-radius: 18px; padding: 12px 20px;">
                <div class="typing-dots">
                    <span>.</span><span>.</span><span>.</span>
                </div>
            </div>
        </div>
    `;
    container.appendChild(indicator);
    scrollToBottom();
}

function hideTypingIndicator() {
    const indicator = document.getElementById('typingIndicator');
    if (indicator) indicator.remove();
}

// Add AI message with typing effect
async function addAIMessageWithTyping(content, messageId, timestamp) {
    const container = document.getElementById('messagesList');
    const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    const messageHtml = `
        <div class="message-row ai-message mb-3" data-message-id="${messageId}">
            <div class="d-flex align-items-start">
                <div class="message-avatar me-2" style="width: 36px; height: 36px; background: #9CAF88; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-robot" style="color: white; font-size: 18px;"></i>
                </div>
                <div class="message-bubble" style="background: #FDF6E9; border-radius: 18px 18px 18px 4px; padding: 12px 16px; max-width: 70%;">
                    <p class="mb-1 typing-text" style="color: #5D7A5C; margin: 0;"></p>
                    <small class="text-muted d-block mt-2">${time}</small>
                </div>
            </div>
        </div>
    `;
    
    container.insertAdjacentHTML('beforeend', messageHtml);
    scrollToBottom();
    
    const newMessage = container.lastElementChild;
    currentTypingMessage = newMessage;
    const textElement = newMessage.querySelector('.typing-text');
    
    await typeMessage(textElement, content, 15);
    
    currentTypingMessage = null;
    
    // Add breathing exercise button if needed
    if (content.toLowerCase().includes('breathing')) {
        const buttonHtml = `
            <button class="breathing-exercise-btn" onclick="startBreathing()">
                <i class="fas fa-play me-1"></i>Start Exercise
            </button>
        `;
        newMessage.querySelector('.message-bubble').insertAdjacentHTML('beforeend', buttonHtml);
    }
}

// Add user message
function addUserMessage(content, timestamp) {
    const container = document.getElementById('messagesList');
    const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    const messageHtml = `
        <div class="message-row user-message mb-3 d-flex justify-content-end">
            <div class="d-flex align-items-start flex-row-reverse">
                <div class="message-avatar ms-2" style="width: 36px; height: 36px; background: #E6E6FA; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-user" style="color: #5D7A5C;"></i>
                </div>
                <div class="message-bubble" style="background: #9CAF88; border-radius: 18px 18px 4px 18px; padding: 12px 16px; max-width: 70%;">
                    <p class="mb-1 text-white">${escapeHtml(content)}</p>
                    <small style="color: rgba(255,255,255,0.8);">${time}</small>
                </div>
            </div>
        </div>
    `;
    
    container.insertAdjacentHTML('beforeend', messageHtml);
    scrollToBottom();
}

// Render messages
function renderMessages(messages) {
    const container = document.getElementById('messagesList');
    if (!container) return;
    
    if (!messages || messages.length === 0) {
        container.innerHTML = `
            <div class="text-center py-5">
                <div style="font-size: 3rem; margin-bottom: 1rem;">💭</div>
                <p class="text-muted small">Start the conversation by sending a message below.</p>
            </div>
        `;
        return;
    }
    
    let html = '';
    messages.forEach(msg => {
        const isUser = msg.sender === 'user';
        const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const content = escapeHtml(msg.content || '');
        
        if (isUser) {
            html += `
                <div class="message-row user-message mb-3 d-flex justify-content-end" data-message-id="${msg.id}">
                    <div class="d-flex align-items-start flex-row-reverse">
                        <div class="message-avatar ms-2" style="width: 36px; height: 36px; background: #E6E6FA; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-user" style="color: #5D7A5C;"></i>
                        </div>
                        <div class="message-bubble" style="background: #9CAF88; border-radius: 18px 18px 4px 18px; padding: 12px 16px; max-width: 70%;">
                            <p class="mb-1 text-white">${content}</p>
                            <small style="color: rgba(255,255,255,0.8);">${time}</small>
                        </div>
                    </div>
                </div>
            `;
        } else {
            html += `
                <div class="message-row ai-message mb-3" data-message-id="${msg.id}">
                    <div class="d-flex align-items-start">
                        <div class="message-avatar me-2" style="width: 36px; height: 36px; background: #9CAF88; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-robot" style="color: white; font-size: 18px;"></i>
                        </div>
                        <div class="message-bubble" style="background: #FDF6E9; border-radius: 18px 18px 18px 4px; padding: 12px 16px; max-width: 70%;">
                            <p class="mb-1" style="color: #5D7A5C;">${content}</p>
                            ${content.toLowerCase().includes('breathing') ? 
                                `<button class="breathing-exercise-btn" onclick="startBreathing()">
                                    <i class="fas fa-play me-1"></i>Start Exercise
                                </button>` : ''
                            }
                            <small class="text-muted d-block mt-2">${time}</small>
                        </div>
                    </div>
                </div>
            `;
        }
    });
    
    container.innerHTML = html;
}

// MAIN FUNCTION: Load messages from API
async function loadMessages() {
    try {
        const data = await ChatAPI.getConversation(conversationId);
        currentConversation = data;
        
        const topicEl = document.getElementById('chatTopic');
        const timeEl = document.getElementById('chatTime');
        if (topicEl) topicEl.textContent = data.topic || 'Conversation';
        if (timeEl && data.last_activity) {
            const date = new Date(data.last_activity);
            timeEl.textContent = date.toLocaleString();
        }
        
        const unreadCount = data.messages?.filter(m => !m.is_read && m.sender === 'ai').length || 0;
        document.title = unreadCount > 0 ? `(${unreadCount}) Chat - MindHaven` : 'Chat - MindHaven';
        
        if (unreadCount > 0) {
            await ChatAPI.markAsRead(conversationId);
        }
        
        const loadingEl = document.getElementById('messagesLoading');
        const errorEl = document.getElementById('messagesError');
        if (loadingEl) loadingEl.style.display = 'none';
        if (errorEl) errorEl.style.display = 'none';
        
        const inputEl = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendButton');
        if (inputEl) inputEl.disabled = isWaitingForResponse;
        if (sendBtn) sendBtn.disabled = isWaitingForResponse;
        
        renderMessages(data.messages || []);
        
    } catch (error) {
        console.error('Failed to load messages:', error);
        const loadingEl = document.getElementById('messagesLoading');
        const errorEl = document.getElementById('messagesError');
        if (loadingEl) loadingEl.style.display = 'none';
        if (errorEl) errorEl.style.display = 'block';
    }
}

// Send message
async function sendMessage(event) {
    event.preventDefault();
    event.stopPropagation();
    
    if (isWaitingForResponse) {
        return;
    }
    
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    
    if (!content) return;
    
    isWaitingForResponse = true;
    updateInputState();
    
    input.value = '';
    
    addUserMessage(content, new Date().toISOString());
    scrollToBottom();
    showTypingIndicator();
    
    try {
        const response = await ChatAPI.sendMessage(content, conversationId);
        hideTypingIndicator();
        
        if (response.message) {
            await addAIMessageWithTyping(response.message, response.message_id || Date.now(), response.timestamp || new Date().toISOString());
        }
        
    } catch (error) {
        console.error('Failed to send message:', error);
        hideTypingIndicator();
        
        const lastUserMessage = document.querySelector('.user-message:last-child');
        if (lastUserMessage) lastUserMessage.remove();
        
        if (typeof flashMessages !== 'undefined') {
            flashMessages.error('Failed to send message. Please try again.');
        }
        
    } finally {
        isWaitingForResponse = false;
        updateInputState();
        
        const inputEl = document.getElementById('messageInput');
        if (inputEl) inputEl.focus();
    }
}

function startBreathing() {
    if (typeof flashMessages !== 'undefined') {
        flashMessages.info('Starting breathing exercise...');
    }
    setTimeout(() => {
        window.location.href = '/resources/breathing-exercise';
    }, 1500);
}

function showChatOptions() {
    const modal = new bootstrap.Modal(document.getElementById('chatOptionsModal'));
    modal.show();
}

function saveConversation() {
    if (typeof flashMessages !== 'undefined') {
        flashMessages.success('Conversation saved!');
    }
    bootstrap.Modal.getInstance(document.getElementById('chatOptionsModal')).hide();
}

function exportChat() {
    if (typeof flashMessages !== 'undefined') {
        flashMessages.info('Preparing PDF for download...');
    }
    setTimeout(() => {
        if (typeof flashMessages !== 'undefined') {
            flashMessages.success('Download started!');
        }
        bootstrap.Modal.getInstance(document.getElementById('chatOptionsModal')).hide();
    }, 1500);
}

async function deleteConversation() {
    if (confirm('Are you sure you want to delete this conversation? This action cannot be undone.')) {
        try {
            await ChatAPI.closeConversation(conversationId);
            if (typeof flashMessages !== 'undefined') {
                flashMessages.success('Conversation deleted');
            }
            window.location.href = "{% url 'pages:chat_list' %}";
        } catch (error) {
            if (typeof flashMessages !== 'undefined') {
                flashMessages.error('Failed to delete conversation');
            }
        }
    }
    bootstrap.Modal.getInstance(document.getElementById('chatOptionsModal')).hide();
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('messageForm');
    if (form) {
        const newForm = form.cloneNode(true);
        form.parentNode.replaceChild(newForm, form);
        newForm.addEventListener('submit', sendMessage);
    }
    
    loadMessages();
    
    // Focus input on mobile when keyboard opens
    const inputEl = document.getElementById('messageInput');
    if (inputEl && window.innerWidth <= 768) {
        inputEl.addEventListener('focus', function() {
            setTimeout(scrollToBottom, 300);
        });
    }
});

// Cleanup
window.addEventListener('beforeunload', function() {
    // No polling to clean up
});
</script>
{% endblock %}
