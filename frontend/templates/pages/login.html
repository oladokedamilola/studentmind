{% extends "base/public_base.html" %}

{% block content %}
<div class="container" style="max-width: 500px;">
    <!-- Back Link -->
    <a href="/" class="d-inline-flex align-items-center mt-4" style="color: #5D7A5C;">
        <i class="fas fa-arrow-left me-2"></i> Back to Home
    </a>

    <!-- Main Card -->
    <div class="card mt-4">
        <div class="text-center mb-4">
            <span style="font-size: 3rem;">🔑</span>
            <h2 class="mt-3">Welcome Back</h2>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Matric Number</label>
                <input type="text" class="form-input" id="matricNumber" 
                       placeholder="202012345" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password" class="form-input" id="password" required>
                    <button type="button" class="position-absolute" style="right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none;" onclick="togglePassword('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember Me</label>
                </div>
                <a href="/forgot-password" style="color: #5D7A5C;">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                Login
            </button>
        </form>

        <!-- Register Link -->
        <div class="text-center mt-4 pt-3" style="border-top: 1px solid #E6E6FA;">
            <p class="mb-0">New to MindHaven?</p>
            <a href="/register" class="btn btn-outline mt-2">Create Account</a>
        </div>
    </div>

    <!-- Attempts Warning (hidden by default) -->
    <div id="attemptsWarning" class="info-card mt-3" style="display: none; background: #ff6b6b20;">
        <span class="info-icon">⚠️</span>
        <span id="attemptsMessage">3 attempts remaining</span>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let attempts = 3;

document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const matricInput = document.getElementById('matricNumber');
    const passwordInput = document.getElementById('password');

    // Real-time matric validation
    matricInput.addEventListener('input', function() {
        const result = validateMatricNumber(this.value);
        if (this.value && !result.valid) {
            this.classList.add('error');
            showError(this, result.message);
        } else {
            this.classList.remove('error');
            removeError(this);
        }
    });

    // Form submission
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const matricNumber = matricInput.value.trim();
        const password = passwordInput.value;
        const rememberMe = document.getElementById('rememberMe').checked;

        // Validate inputs
        const matricResult = validateMatricNumber(matricNumber);
        if (!matricResult.valid) {
            flashMessages.error(matricResult.message);
            return;
        }

        if (!password) {
            flashMessages.error('Password is required');
            return;
        }

        // Show loading
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

        // Attempt login
        const result = await login(matricNumber, password, rememberMe);
        
        if (result.success) {
            flashMessages.success('Login successful!');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 2000);
        } else {
            attempts--;
            
            if (attempts > 0) {
                const warning = document.getElementById('attemptsWarning');
                document.getElementById('attemptsMessage').textContent = 
                    `Invalid credentials. ${attempts} attempt${attempts > 1 ? 's' : ''} remaining.`;
                warning.style.display = 'block';
                
                flashMessages.error(result.error || 'Login failed');
            } else {
                flashMessages.error('Too many failed attempts. Please reset your password.');
                setTimeout(() => {
                    window.location.href = '/forgot-password';
                }, 3000);
            }
            
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Login';
        }
    });
});

function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const toggleBtn = field.nextElementSibling.querySelector('i');
    
    if (field.type === 'password') {
        field.type = 'text';
        toggleBtn.classList.remove('fa-eye');
        toggleBtn.classList.add('fa-eye-slash');
    } else {
        field.type = 'password';
        toggleBtn.classList.remove('fa-eye-slash');
        toggleBtn.classList.add('fa-eye');
    }
}

function showError(input, message) {
    removeError(input);
    const error = document.createElement('span');
    error.className = 'form-error';
    error.textContent = message;
    input.parentNode.appendChild(error);
}

function removeError(input) {
    const existingError = input.parentNode.querySelector('.form-error');
    if (existingError) existingError.remove();
}
</script>
{% endblock %}
